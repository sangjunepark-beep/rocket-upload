<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>로켓출력공장 · 디자인 파일 접수</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #E63946;
      --brand-dark: #C1121F;
      --accent: #FF8C42;
      --canva-1: #00C4CC;
      --canva-2: #7D2AE8;
      --bg: #F7F7F9;
      --card: #FFFFFF;
      --text: #1D1D1F;
      --sub: #6B6B6B;
      --border: #E5E5EA;
      --success: #2A9D8F;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }
    body {
      min-height: 100vh;
      padding: 20px 16px 60px;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      padding: 20px 0 12px;
    }
    header .logo {
      display: inline-block;
      width: 100%;
      max-width: 360px;
      height: auto;
    }
    .btn-row {
      display: grid;
      grid-template-columns: 2.2fr 1fr;
      gap: 10px;
      margin-top: 18px;
      align-items: stretch;
    }
    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.98); }

    /* 업로드 버튼 - 메인 (크게) */
    .btn-upload {
      padding: 45px 20px;
      min-height: 252px;
      gap: 18px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff;
      box-shadow: 0 14px 36px rgba(230, 57, 70, 0.32);
    }
    .btn-upload:hover { box-shadow: 0 18px 42px rgba(230, 57, 70, 0.42); }
    .btn-upload .icon {
      font-size: 66px;
      line-height: 1;
    }
    .btn-upload .label {
      font-size: 27px;
      letter-spacing: -0.01em;
      line-height: 1.25;
      text-align: center;
    }
    .btn-upload .sub {
      font-size: 17px;
      font-weight: 500;
      opacity: 0.9;
    }

    /* 캔바 버튼 - 서브 (작게) */
    .btn-canva {
      padding: 24px 14px;
      min-height: 252px;
      gap: 12px;
      background: linear-gradient(135deg, var(--canva-1) 0%, var(--canva-2) 100%);
      color: #fff;
      box-shadow: 0 8px 20px rgba(125, 42, 232, 0.20);
    }
    .btn-canva:hover { box-shadow: 0 10px 24px rgba(125, 42, 232, 0.28); }
    .btn-canva .icon {
      font-size: 36px;
      line-height: 1;
    }
    .btn-canva .label {
      font-size: 19.5px;
      letter-spacing: -0.01em;
      line-height: 1.25;
      text-align: center;
    }
    .btn-canva .brand {
      font-size: 15px;
      font-weight: 600;
      opacity: 0.95;
      letter-spacing: 0.06em;
      background: rgba(255,255,255,0.22);
      padding: 3px 12px;
      border-radius: 999px;
    }
    .note {
      margin-top: 14px;
      padding: 10px 12px;
      background: #FFF7ED;
      border: 1px solid #FFE0B8;
      border-radius: 8px;
      font-size: 12.5px;
      color: #8A5A00;
      text-align: center;
    }
    .form-section {
      margin-top: 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 18px 22px;
      opacity: 0;
      transform: translateY(-6px);
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.25s ease, transform 0.25s ease, max-height 0.4s ease, margin-top 0.25s ease, padding 0.25s ease;
    }
    .form-section.show {
      opacity: 1;
      transform: translateY(0);
      max-height: 2000px;
    }
    .form-section h2 {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-section h2::before {
      content: "";
      width: 4px;
      height: 16px;
      background: var(--brand);
      border-radius: 2px;
    }
    .form-section .subtitle {
      font-size: 12.5px;
      color: var(--sub);
      margin-bottom: 16px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    .field .req { color: var(--brand); margin-left: 2px; }
    .field input[type="text"],
    .field input[type="tel"],
    .field textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14.5px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.12);
    }
    .field textarea {
      resize: vertical;
      min-height: 90px;
    }
    .file-drop {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 18px 14px;
      text-align: center;
      background: #FAFAFC;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .file-drop:hover {
      border-color: var(--brand);
      background: #FFF5F5;
    }
    .file-drop input[type="file"] {
      display: none;
    }
    .file-drop .icon {
      font-size: 26px;
      display: block;
      margin-bottom: 6px;
    }
    .file-drop .txt {
      font-size: 13px;
      color: var(--sub);
    }
    .file-drop .txt strong { color: var(--text); }
    .file-list {
      margin-top: 10px;
      font-size: 12.5px;
      color: var(--sub);
    }
    .file-list .file-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 10px;
      background: #F3F4F6;
      border-radius: 6px;
      margin-bottom: 4px;
    }
    .hint {
      font-size: 11.5px;
      color: var(--sub);
      margin-top: 6px;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 6px 16px rgba(230, 57, 70, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .submit-btn:hover { box-shadow: 0 8px 20px rgba(230, 57, 70, 0.34); }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled {
      background: #B0B0B5;
      box-shadow: none;
      cursor: not-allowed;
    }
    .honeypot {
      position: absolute;
      left: -5000px;
      top: -5000px;
      opacity: 0;
      height: 0;
      width: 0;
    }
    footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11.5px;
      color: var(--sub);
    }
    footer strong { color: var(--text); }

    @media (max-width: 380px) {
      .btn-row { grid-template-columns: 2fr 1fr; gap: 8px; }
      .btn-upload { min-height: 225px; padding: 36px 14px; gap: 14px; }
      .btn-upload .icon { font-size: 57px; }
      .btn-upload .label { font-size: 24px; }
      .btn-upload .sub { font-size: 16px; }
      .btn-canva { min-height: 225px; padding: 20px 10px; gap: 10px; }
      .btn-canva .icon { font-size: 33px; }
      .btn-canva .label { font-size: 18px; }
      .btn-canva .brand { font-size: 14px; padding: 2px 8px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="logo.png" alt="로켓출력공장 Rocket Printing" class="logo">
    </header>

    <section class="btn-row" aria-label="접수 방법 선택">
      <button type="button" id="uploadBtn" class="btn btn-upload" aria-controls="formSection" aria-expanded="false">
        <span class="icon" aria-hidden="true">📁</span>
        <span class="label">디자인파일 업로드</span>
        <span class="sub">파일을 첨부하고 접수해주세요</span>
      </button>
      <a href="https://www.canva.com" target="_blank" rel="noopener noreferrer" class="btn btn-canva">
        <span class="icon" aria-hidden="true">🎨</span>
        <span class="label">직접디자인 하기</span>
        <span class="brand">Canva</span>
      </a>
    </section>

    <p class="note">※ 직접디자인해서 파일업로드할 수 있습니다.</p>

    <section id="formSection" class="form-section" aria-live="polite">
      <h2>파일 접수</h2>
      <p class="subtitle">주문자 정보와 디자인 파일을 접수해주세요. 접수 확인 후 연락드립니다.</p>

      <form id="uploadForm" action="https://formsubmit.co/hs16447523@daum.net" method="POST" enctype="multipart/form-data">
        <!-- FormSubmit settings -->
        <input type="hidden" name="_subject" value="[★로켓출력공장-접수파일] 신규 접수">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://sangjunepark-beep.github.io/rocket-upload/thanks.html">
        <!-- honeypot -->
        <input type="text" name="_honey" class="honeypot" tabindex="-1" autocomplete="off">

        <div class="field">
          <label for="name">주문자명<span class="req">*</span></label>
          <input type="text" id="name" name="주문자명" required autocomplete="name" placeholder="예: 홍길동">
        </div>

        <div class="field">
          <label for="phone">연락처<span class="req">*</span></label>
          <input type="tel" id="phone" name="연락처" required autocomplete="tel" placeholder="010-0000-0000" inputmode="tel" pattern="[0-9\-+\s]{9,20}">
        </div>

        <div class="field">
          <label for="memo">내용</label>
          <textarea id="memo" name="내용" placeholder="주문 번호, 출력 사이즈, 수량, 요청사항 등을 적어주세요."></textarea>
        </div>

        <div class="field">
          <label>디자인 파일<span class="req">*</span></label>
          <label class="file-drop" for="fileInput">
            <span class="icon" aria-hidden="true">📎</span>
            <span class="txt"><strong>클릭해서 파일 선택</strong><br>또는 여기로 파일 끌어오기</span>
            <input type="file" id="fileInput" name="첨부파일" multiple required>
          </label>
          <div id="fileList" class="file-list" aria-live="polite"></div>
          <p class="hint">파일당 최대 10MB · 여러 개 선택 가능 · AI, PSD, PDF, JPG, PNG 등</p>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">접수하기</button>
      </form>
    </section>

    <footer>
      <strong>하나사인몰 · 로켓출력공장</strong><br>
      문의: hs16447523@daum.net
    </footer>
  </div>

  <script>
    (function() {
      var uploadBtn = document.getElementById('uploadBtn');
      var formSection = document.getElementById('formSection');
      var fileInput = document.getElementById('fileInput');
      var fileList = document.getElementById('fileList');
      var form = document.getElementById('uploadForm');
      var submitBtn = document.getElementById('submitBtn');
      var dropZone = document.querySelector('.file-drop');

      // 업로드 버튼 → 폼 토글
      uploadBtn.addEventListener('click', function() {
        var isOpen = formSection.classList.contains('show');
        if (!isOpen) {
          formSection.classList.add('show');
          uploadBtn.setAttribute('aria-expanded', 'true');
          setTimeout(function() {
            formSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 100);
        } else {
          formSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });

      // 파일 목록 표시
      function renderFileList() {
        fileList.innerHTML = '';
        if (!fileInput.files || fileInput.files.length === 0) return;
        for (var i = 0; i < fileInput.files.length; i++) {
          var f = fileInput.files[i];
          var div = document.createElement('div');
          div.className = 'file-item';
          var name = document.createElement('span');
          name.textContent = f.name;
          var size = document.createElement('span');
          size.textContent = (f.size / 1024 / 1024).toFixed(2) + ' MB';
          div.appendChild(name);
          div.appendChild(size);
          fileList.appendChild(div);
        }
      }
      fileInput.addEventListener('change', renderFileList);

      // 드래그 & 드롭
      ['dragenter','dragover'].forEach(function(ev) {
        dropZone.addEventListener(ev, function(e) {
          e.preventDefault(); e.stopPropagation();
          dropZone.style.borderColor = 'var(--brand)';
          dropZone.style.background = '#FFF5F5';
        });
      });
      ['dragleave','drop'].forEach(function(ev) {
        dropZone.addEventListener(ev, function(e) {
          e.preventDefault(); e.stopPropagation();
          dropZone.style.borderColor = '';
          dropZone.style.background = '';
        });
      });
      dropZone.addEventListener('drop', function(e) {
        if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
          fileInput.files = e.dataTransfer.files;
          renderFileList();
        }
      });

      // 제출 전 검증 (파일 용량)
      form.addEventListener('submit', function(e) {
        if (!fileInput.files || fileInput.files.length === 0) {
          e.preventDefault();
          alert('디자인 파일을 첨부해주세요.');
          return;
        }
        var total = 0;
        for (var i = 0; i < fileInput.files.length; i++) {
          if (fileInput.files[i].size > 10 * 1024 * 1024) {
            e.preventDefault();
            alert('파일당 10MB를 초과할 수 없습니다: ' + fileInput.files[i].name);
            return;
          }
          total += fileInput.files[i].size;
        }
        if (total > 25 * 1024 * 1024) {
          e.preventDefault();
          alert('전체 첨부 용량은 25MB를 초과할 수 없습니다. 파일을 나눠서 접수해주세요.');
          return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = '접수 중...';
      });
    })();
  </script>
</body>
</html>
