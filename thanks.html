<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>접수 완료 · 로켓출력공장</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F7F7F9;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      color: #1D1D1F;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 36px 26px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      border: 1px solid #E5E5EA;
    }
    .icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, #1559FF 0%, #0033CC 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: #fff;
      box-shadow: 0 8px 20px rgba(0, 72, 240, 0.32);
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    p {
      color: #6B6B6B;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 22px;
    }
    .info-box {
      background: #F2F5FF;
      border: 1px solid #D9E2FF;
      border-radius: 10px;
      padding: 14px;
      text-align: left;
      font-size: 13px;
      color: #444;
      margin-bottom: 22px;
      line-height: 1.7;
    }
    .info-box strong { color: #1D1D1F; }
    .info-box .accent { color: #1559FF; font-weight: 700; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #1559FF 0%, #0033CC 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(0, 72, 240, 0.28);
      transition: box-shadow 0.15s ease;
    }
    .btn:hover { box-shadow: 0 8px 22px rgba(0, 72, 240, 0.40); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">✓</div>
    <h1>접수가 완료되었습니다</h1>
    <p>디자인 파일이 정상적으로 접수되었습니다.<br>확인 후 빠르게 연락드리겠습니다.</p>
    <div class="info-box">
      <strong>로켓출력공장</strong><br>
      · 평일 작업시간 내 순차 확인<br>
      · 담당자가 연락처로 개별 회신<br>
      · 문의: <span class="accent">hs16447523@hanmail.net</span><br>
      · 전화: <span class="accent">1644-7523</span>
    </div>
    <a href="./" class="btn">처음으로</a>
  </div>
</body>
</html>
